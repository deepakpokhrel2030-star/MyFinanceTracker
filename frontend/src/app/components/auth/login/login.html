<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
  <div class="card shadow-sm border-0 p-4" style="width:100%;max-width:420px;">

    <div class="text-center mb-4">
      <i class="bi bi-wallet2 text-primary" style="font-size:2.5rem;"></i>
      <h4 class="fw-semibold mt-2 mb-1">Welcome back</h4>
      <p class="text-muted small mb-0">Sign in to your finance dashboard</p>
    </div>

    <div *ngIf="error" class="alert alert-danger py-2 small d-flex align-items-center gap-2">
      <i class="bi bi-exclamation-triangle-fill"></i>
      <span>{{ error }}</span>
    </div>

    <form (ngSubmit)="onSubmit()" novalidate>
      <div class="mb-3">
        <label class="form-label small fw-medium">Email address</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0">
            <i class="bi bi-envelope text-muted" style="font-size:14px;"></i>
          </span>
          <input
            type="email"
            class="form-control border-start-0"
            [class.is-invalid]="error && !email"
            placeholder="you@example.com"
            [(ngModel)]="email"
            name="email"
            autofocus
          />
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label small fw-medium">Password</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0">
            <i class="bi bi-lock text-muted" style="font-size:14px;"></i>
          </span>
          <input
            type="password"
            class="form-control border-start-0"
            [class.is-invalid]="error && !password"
            placeholder="Enter your password"
            [(ngModel)]="password"
            name="password"
          />
        </div>
      </div>

      <button
        type="submit"
        class="btn btn-primary w-100"
        [disabled]="loading"
      >
        <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
        {{ loading ? 'Signing in...' : 'Sign in' }}
      </button>
    </form>

    <hr class="my-4">
    <p class="text-center text-muted small mb-0">
      Don't have an account?
      <a href="/register" class="text-primary text-decoration-none fw-medium">Create one</a>
    </p>

  </div>
</div>
