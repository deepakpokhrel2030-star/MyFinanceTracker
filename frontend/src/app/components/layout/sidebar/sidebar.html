<div class="sidebar" [class.collapsed]="collapsed">

  <div class="window-dots">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <a routerLink="/dashboard" class="sidebar-brand">
    <div class="brand-icon">
      <i class="bi bi-wallet2"></i>
    </div>

    <span class="brand-text">FinanceTracker</span>

    <button
      class="collapse-btn"
      type="button"
      (click)="toggleSidebar(); $event.preventDefault(); $event.stopPropagation();"
    >
      <i class="bi" [class.bi-chevron-left]="!collapsed" [class.bi-chevron-right]="collapsed"></i>
    </button>
  </a>

  <nav class="sidebar-nav">
    <a
      *ngFor="let item of navItems"
      [routerLink]="item.path"
      routerLinkActive="active"
      class="nav-item"
      [attr.data-label]="item.label"
    >
      <i class="bi {{ item.icon }} nav-icon"></i>
      <span class="nav-label">{{ item.label }}</span>
    </a>

    <div class="nav-divider"></div>

    <div *ngIf="isAdmin()">
      <a
        routerLink="/admin"
        routerLinkActive="active"
        class="nav-item nav-item-admin"
        data-label="Admin Panel"
      >
        <i class="bi bi-shield-lock nav-icon"></i>
        <span class="nav-label">Admin Panel</span>
      </a>
    </div>
  </nav>

  <div class="sidebar-footer">
    <a routerLink="/profile" class="user-card" data-label="Profile">
      <div class="user-avatar">
        {{ user?.name?.charAt(0)?.toUpperCase() || 'U' }}
      </div>

      <div class="user-info">
        <p class="user-name">{{ user?.name || 'User' }}</p>
        <p class="user-email">{{ user?.email }}</p>
      </div>
    </a>

    <button class="logout-btn" type="button" (click)="logout()" data-label="Logout">
      <i class="bi bi-box-arrow-right"></i>
    </button>
  </div>

</div>
